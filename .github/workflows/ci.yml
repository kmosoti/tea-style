name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Ruff check
        run: uv run ruff check
      - name: Ruff format check
        run: uv run ruff format --check
      - name: Pyright
        run: uv run pyright
      - name: Tests
        run: uv run pytest
      - name: TEA KB validate
        run: uv run tea-kb validate
      - name: TEA KB build check
        run: uv run tea-kb build --check
