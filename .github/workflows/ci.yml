name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Ruff check
        run: uv run ruff check
      - name: Ruff format check
        run: uv run ruff format --check
      - name: Pyright
        run: uv run pyright
      - name: Tests
        run: uv run pytest
      - name: TEA KB validate
        run: uv run tea-kb validate
      - name: TEA KB updated date check
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          uv run tea-kb validate --check-updated-since "origin/${{ github.base_ref }}" --strict
      - name: TEA KB build check
        run: uv run tea-kb build --check
      - name: Upload generated graph artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tea-generated-graph
          path: graph/generated
